services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-moneyflow_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-moneyflow_dev}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0}
    environment:
      ENV: ${ENV:-prod}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-moneyflow_dev}}
      SECRET_KEY: ${SECRET_KEY}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_DEBUG_RETURN_VERIFY_TOKEN: ${AUTH_DEBUG_RETURN_VERIFY_TOKEN:-false}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-172.30.0.0/24,127.0.0.1,::1}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://dev.moneyflow.enmsoftware.com}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://dev.moneyflow.enmsoftware.com}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-smtp}
      SMTP_HOST: ${SMTP_HOST:-enm-mail-smtp}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:18081:8000"
    networks:
      - default
      - enm-services-mail

volumes:
  pgdata:

networks:
  default:
    ipam:
      config:
        - subnet: 172.31.0.0/24
  enm-services-mail:
    external: true
    name: enm-services-mail
